{% extends 'base.html' %}
{% block content %}
<h1>My Notes</h1>
<a href="{% url 'add_note' %}">Add Note</a>
<hr>
{% for note in notes %}
<h3>{{ note.title }}</h3>

<p>{{ note.content }}</p>
<a href="{% url 'edit_note' note.id %}">Edit</a>
<a href="{% url 'delete_note' note.id %}">Delete</a>
<hr>
{% empty %}
<p>No Notes Found.</p>
{% endfor %}
{% endblock %}
